<!doctype html>
<html lang="en" class="no-js">
  <head>
    <meta charset="utf-8" />
    <title>Card carousel — News and events</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="An accessible, responsive card carousel built on the NSW Design System."
    />
    <link rel="icon" href="https://designsystem.nsw.gov.au/favicon.ico" />

    <!-- Swap no-js for js up front so CSS can react before paint. -->
    <script>
      document.documentElement.classList.replace('no-js', 'js');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Icons"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/carousel.css" />
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <main id="main" class="page">
      <header class="page__header">
        <h1 id="carousel-heading">Latest news and events</h1>
        <p class="page__intro">
          News and events from across the NSW Government.
        </p>
      </header>

      <!-- Cards are rendered into the empty <ol> from cards.json by carousel.js.
           Behaviour is configured via data-* attributes (CMS-friendly). -->
      <section
        class="nsw-carousel js-carousel"
        data-carousel
        data-source="assets/data/cards.json"
        data-per-view-desktop="4"
        data-per-view-tablet="2"
        data-per-view-mobile="1"
        aria-roledescription="carousel"
        aria-labelledby="carousel-heading"
      >
        <p class="sr-only" aria-live="polite" data-carousel-status></p>

        <!-- Controls precede the cards in the DOM so tab order matches the
             visual order (arrows sit above the cards). WCAG 2.4.3. -->
        <div class="nsw-carousel__header">
          <nav aria-label="Carousel controls">
            <ul>
              <li>
                <button
                  type="button"
                  aria-label="Show previous items"
                  data-carousel-prev
                  class="nsw-carousel__control nsw-carousel__control--prev js-carousel__control"
                >
                  <svg
                    class="nsw-icon"
                    viewBox="0 0 20 20"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <polyline
                      points="13 2 5 10 13 18"
                      fill="none"
                      stroke="currentColor"
                      stroke-linecap="square"
                      stroke-linejoin="square"
                      stroke-width="2"
                    />
                  </svg>
                </button>
              </li>
              <li>
                <button
                  type="button"
                  aria-label="Show next items"
                  data-carousel-next
                  class="nsw-carousel__control nsw-carousel__control--next js-carousel__control"
                >
                  <svg
                    class="nsw-icon"
                    viewBox="0 0 20 20"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <polyline
                      points="7 2 15 10 7 18"
                      fill="none"
                      stroke="currentColor"
                      stroke-linecap="square"
                      stroke-linejoin="square"
                      stroke-width="2"
                    />
                  </svg>
                </button>
              </li>
            </ul>
          </nav>
        </div>

        <div class="nsw-carousel__wrapper js-carousel__wrapper">
          <ol class="nsw-carousel__list" data-carousel-track></ol>
        </div>

        <ul
          class="nsw-carousel__pagination"
          data-carousel-dots
          aria-label="Choose slide to display"
        ></ul>
      </section>
    </main>

    <!-- One reusable modal, hidden until a card is opened. Content is injected
         via data-modal-* hooks; dialog behaviour lives in modal.js. -->
    <div class="modal" data-modal hidden>
      <div class="modal__overlay" data-modal-overlay></div>

      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        tabindex="-1"
      >
        <button type="button" class="modal__close" data-modal-close>
          <span class="material-icons" aria-hidden="true">close</span>
          <span class="sr-only">Close</span>
        </button>

        <div class="modal__media">
          <img data-modal-image src="" alt="" />
        </div>

        <div class="modal__content">
          <p class="modal__tag" data-modal-tag></p>
          <h2 id="modal-title" data-modal-title></h2>
          <p class="modal__date" data-modal-date></p>
          <div data-modal-body></div>
          <a class="button" data-modal-link href="#">
            Read full story
            <span class="material-icons" aria-hidden="true">east</span>
          </a>
        </div>
      </div>
    </div>

    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
